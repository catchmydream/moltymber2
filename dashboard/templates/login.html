<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molty Dashboard — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a0a0f;font-family:'JetBrains Mono',monospace;color:#e2e8f0}
  .box{background:#111118;border:1px solid #2a2a3a;border-radius:16px;
    padding:40px 32px;width:90%;max-width:360px;text-align:center}
  .logo{font-size:28px;font-weight:700;color:#a78bfa;margin-bottom:4px}
  .sub{font-size:11px;color:#4a4a6a;margin-bottom:32px;letter-spacing:2px;text-transform:uppercase}
  input{width:100%;padding:14px 16px;background:#0d0d14;border:1px solid #2a2a3a;
    border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:15px;
    outline:none;margin-bottom:16px}
  input:focus{border-color:#a78bfa}
  button{width:100%;padding:14px;background:#a78bfa;border:none;border-radius:8px;
    color:#0a0a0f;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
  .err{color:#f87171;font-size:12px;margin-bottom:12px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">⚔ MOLTY</div>
  <div class="sub">Bot Dashboard</div>
  {% if error %}<div class="err">Password salah, coba lagi.</div>{% endif %}
  <form method="POST" action="/login">
    <input type="password" name="password" placeholder="Masukkan password" autofocus>
    <button type="submit">Masuk →</button>
  </form>
</div>
</body>
</html>
